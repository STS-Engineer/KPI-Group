<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KPI Training Center</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet" />
    <style>
        :root {
            --bg: #f3f7fb;
            --bg-soft: #edf3f9;
            --surface: rgba(255, 255, 255, .9);
            --surface-solid: #ffffff;
            --border: rgba(148, 163, 184, .22);
            --border-strong: rgba(148, 163, 184, .34);
            --ink: #0f172a;
            --text: #1e293b;
            --muted: #64748b;
            --muted-soft: #94a3b8;
            --blue: #1d4ed8;
            --blue-soft: #eff6ff;
            --teal: #0f766e;
            --teal-soft: #ecfeff;
            --amber: #d97706;
            --amber-soft: #fff7ed;
            --green: #059669;
            --green-soft: #ecfdf5;
            --red: #dc2626;
            --red-soft: #fef2f2;
            --shadow-sm: 0 14px 28px rgba(15, 23, 42, .06);
            --shadow-md: 0 24px 54px rgba(15, 23, 42, .08);
            --shadow-lg: 0 30px 90px rgba(15, 23, 42, .12);
            --radius: 24px;
            --radius-sm: 16px;
            --radius-xs: 12px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: "Manrope", sans-serif;
            min-height: 100vh;
            color: var(--text);
            background:
                radial-gradient(circle at top left, rgba(29, 78, 216, .14), transparent 28%),
                radial-gradient(circle at top right, rgba(15, 118, 110, .12), transparent 26%),
                linear-gradient(180deg, #f8fbff 0%, var(--bg) 50%, #eef4f8 100%);
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            pointer-events: none;
            background-image:
                linear-gradient(rgba(148, 163, 184, .08) 1px, transparent 1px),
                linear-gradient(90deg, rgba(148, 163, 184, .08) 1px, transparent 1px);
            background-size: 46px 46px;
            mask-image: linear-gradient(to bottom, rgba(0, 0, 0, .34), transparent 72%);
        }

        .topbar {
            position: sticky;
            top: 0;
            z-index: 50;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            padding: 18px 28px;
            background: rgba(248, 251, 255, .82);
            border-bottom: 1px solid rgba(226, 232, 240, .8);
            backdrop-filter: blur(18px) saturate(160%);
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .brand-mark {
            width: 46px;
            height: 46px;
            border-radius: 16px;
            background: linear-gradient(145deg, #0f172a 0%, #1d4ed8 62%, #14b8a6 100%);
            box-shadow: 0 14px 28px rgba(29, 78, 216, .22);
        }

        .brand-copy strong {
            display: block;
            font-family: "Space Grotesk", sans-serif;
            font-size: 19px;
            letter-spacing: -.4px;
            color: var(--ink);
        }

        .brand-copy span {
            display: block;
            margin-top: 3px;
            font-size: 12px;
            font-weight: 600;
            color: var(--muted);
        }

        .topbar-status {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 14px;
            border-radius: 999px;
            background: rgba(255, 255, 255, .82);
            border: 1px solid rgba(148, 163, 184, .16);
            box-shadow: var(--shadow-sm);
            font-size: 12px;
            font-weight: 700;
            color: var(--muted);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--green);
            box-shadow: 0 0 0 5px rgba(5, 150, 105, .12);
        }

        .page {
            width: 100%;
            max-width: none;
            margin: 0;
            padding: 18px 20px 26px;
        }

        .app-shell {
            display: grid;
            grid-template-columns: 272px minmax(0, 1fr);
            gap: 20px;
            align-items: start;
        }

        .rail {
            position: sticky;
            top: 92px;
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        .panel {
            background: var(--surface);
            border: 1px solid rgba(226, 232, 240, .84);
            border-radius: var(--radius);
            box-shadow: var(--shadow-sm);
            backdrop-filter: blur(18px) saturate(150%);
        }

        .rail-hero {
            padding: 22px;
            background: linear-gradient(160deg, #0f172a 0%, #1447b5 58%, #0f766e 100%);
            color: #fff;
            overflow: hidden;
            position: relative;
        }

        .rail-hero::after {
            content: "";
            position: absolute;
            right: -68px;
            top: -76px;
            width: 220px;
            height: 220px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255, 255, 255, .2), transparent 64%);
        }

        .eyebrow {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 6px 11px;
            border-radius: 999px;
            background: rgba(255, 255, 255, .14);
            border: 1px solid rgba(255, 255, 255, .16);
            font-size: 10px;
            font-weight: 800;
            letter-spacing: .7px;
            text-transform: uppercase;
        }

        .rail-hero h2 {
            margin-top: 16px;
            font-family: "Space Grotesk", sans-serif;
            font-size: 28px;
            line-height: 1.08;
            letter-spacing: -.8px;
        }

        .rail-hero p {
            margin-top: 12px;
            max-width: 260px;
            font-size: 13px;
            line-height: 1.7;
            color: rgba(255, 255, 255, .82);
        }

        .person-card {
            padding: 20px 22px;
        }

        .section-title {
            font-size: 11px;
            font-weight: 800;
            letter-spacing: .72px;
            text-transform: uppercase;
            color: var(--muted);
        }

        .person-name {
            margin-top: 12px;
            font-size: 22px;
            font-weight: 800;
            color: var(--ink);
            letter-spacing: -.4px;
        }

        .person-role {
            margin-top: 6px;
            font-size: 13px;
            color: var(--muted);
        }

        .person-email {
            margin-top: 12px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 9px 12px;
            border-radius: 999px;
            background: #f8fafc;
            border: 1px solid rgba(226, 232, 240, .9);
            font-size: 12px;
            font-weight: 700;
            color: var(--muted);
        }

        .mini-metrics {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 12px;
            margin-top: 18px;
        }

        .mini-metric {
            padding: 14px;
            border-radius: 18px;
            border: 1px solid rgba(226, 232, 240, .92);
            background: linear-gradient(180deg, #ffffff, #f8fbff);
        }

        .mini-metric span {
            display: block;
            font-size: 10px;
            font-weight: 800;
            letter-spacing: .68px;
            text-transform: uppercase;
            color: var(--muted);
        }

        .mini-metric strong {
            display: block;
            margin-top: 8px;
            font-size: 24px;
            font-weight: 850;
            color: var(--ink);
            letter-spacing: -.9px;
        }

        .assignment-card-wrap {
            padding: 20px 18px 18px;
        }

        .assignment-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 14px;
        }

        .assignment-card {
            width: 100%;
            padding: 16px;
            border-radius: 18px;
            border: 1px solid rgba(226, 232, 240, .92);
            background: linear-gradient(180deg, rgba(255, 255, 255, .98), rgba(248, 250, 252, .94));
            text-align: left;
            cursor: pointer;
            transition: transform .18s ease, box-shadow .18s ease, border-color .18s ease;
        }

        .assignment-card:hover,
        .assignment-card.is-active {
            transform: translateY(-2px);
            border-color: rgba(29, 78, 216, .26);
            box-shadow: 0 18px 34px rgba(29, 78, 216, .10);
        }

        .assignment-card-top {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 10px;
        }

        .assignment-kpi {
            font-size: 14px;
            font-weight: 800;
            color: var(--ink);
            line-height: 1.4;
        }

        .assignment-training {
            margin-top: 5px;
            font-size: 12px;
            color: var(--muted);
            line-height: 1.55;
        }

        .status-chip {
            display: inline-flex;
            align-items: center;
            gap: 7px;
            padding: 7px 10px;
            border-radius: 999px;
            font-size: 10px;
            font-weight: 850;
            white-space: nowrap;
            border: 1px solid transparent;
        }

        .status-chip::before {
            content: "";
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: currentColor;
            opacity: .8;
        }

        .status-training_sent {
            background: #eff6ff;
            color: #1d4ed8;
            border-color: #bfdbfe;
        }

        .status-training_done {
            background: #ecfeff;
            color: #0f766e;
            border-color: #99f6e4;
        }

        .status-test_sent {
            background: #effcf6;
            color: #15803d;
            border-color: #bbf7d0;
        }

        .status-test_overdue,
        .status-escalated {
            background: #fff7ed;
            color: #c2410c;
            border-color: #fed7aa;
        }

        .status-completed_pass {
            background: #ecfdf5;
            color: #047857;
            border-color: #a7f3d0;
        }

        .status-completed_fail {
            background: #fef2f2;
            color: #b91c1c;
            border-color: #fecaca;
        }

        .assignment-meta {
            margin-top: 14px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            font-size: 11px;
            color: var(--muted);
        }

        .workspace {
            min-width: 0;
        }

        .flash {
            margin-bottom: 16px;
            padding: 14px 18px;
            border-radius: 18px;
            border: 1px solid rgba(226, 232, 240, .84);
            background: rgba(255, 255, 255, .82);
            color: var(--muted);
            font-size: 13px;
            font-weight: 700;
            display: none;
        }

        .flash.is-visible {
            display: block;
        }

        .flash.success {
            background: var(--green-soft);
            border-color: #a7f3d0;
            color: #047857;
        }

        .flash.error {
            background: var(--red-soft);
            border-color: #fecaca;
            color: #b91c1c;
        }

        .hero {
            padding: 28px;
            background: linear-gradient(140deg, rgba(255, 255, 255, .96), rgba(239, 246, 255, .92));
            box-shadow: var(--shadow-md);
            position: relative;
            overflow: hidden;
        }

        .hero::after {
            content: "";
            position: absolute;
            right: -84px;
            top: -94px;
            width: 280px;
            height: 280px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(29, 78, 216, .16), transparent 68%);
        }

        .hero-grid {
            display: grid;
            grid-template-columns: minmax(0, 1.35fr) minmax(280px, .8fr);
            gap: 18px;
            align-items: end;
            position: relative;
            z-index: 1;
        }

        .hero h1 {
            margin-top: 14px;
            font-family: "Space Grotesk", sans-serif;
            font-size: clamp(30px, 4vw, 46px);
            line-height: 1.04;
            letter-spacing: -1.4px;
            color: var(--ink);
        }

        .hero p {
            margin-top: 12px;
            max-width: 760px;
            font-size: 15px;
            line-height: 1.7;
            color: var(--muted);
        }

        .hero-metrics {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 12px;
        }

        .hero-metric {
            padding: 16px;
            border-radius: 18px;
            background: rgba(255, 255, 255, .78);
            border: 1px solid rgba(226, 232, 240, .86);
            box-shadow: 0 12px 24px rgba(15, 23, 42, .05);
        }

        .hero-metric span {
            display: block;
            font-size: 10px;
            font-weight: 850;
            letter-spacing: .68px;
            text-transform: uppercase;
            color: var(--muted);
        }

        .hero-metric strong {
            display: block;
            margin-top: 8px;
            font-size: 18px;
            font-weight: 850;
            color: var(--ink);
            letter-spacing: -.4px;
        }

        .summary-grid {
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 16px;
            margin-top: 18px;
        }

        .summary-card {
            padding: 20px;
        }

        .summary-card span {
            display: block;
            font-size: 11px;
            font-weight: 850;
            letter-spacing: .7px;
            text-transform: uppercase;
            color: var(--muted);
        }

        .summary-card strong {
            display: block;
            margin-top: 10px;
            font-size: 26px;
            font-weight: 850;
            color: var(--ink);
            letter-spacing: -.8px;
        }

        .summary-card small {
            display: block;
            margin-top: 8px;
            font-size: 12px;
            color: var(--muted);
            line-height: 1.6;
        }

        .step-strip {
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 12px;
            margin-top: 18px;
        }

        .step-card {
            padding: 16px 18px;
            border-radius: 18px;
            background: rgba(255, 255, 255, .86);
            border: 1px solid rgba(226, 232, 240, .86);
        }

        .step-card strong {
            display: block;
            font-size: 13px;
            font-weight: 800;
            color: var(--ink);
        }

        .step-card span {
            display: block;
            margin-top: 6px;
            font-size: 12px;
            color: var(--muted);
            line-height: 1.5;
        }

        .step-card.is-done {
            background: linear-gradient(180deg, #ecfdf5, #ffffff);
            border-color: #a7f3d0;
        }

        .step-card.is-current {
            background: linear-gradient(180deg, #eff6ff, #ffffff);
            border-color: #bfdbfe;
        }

        .content-grid {
            display: grid;
            grid-template-columns: minmax(0, 1fr);
            gap: 20px;
            margin-top: 18px;
            align-items: start;
        }

        .content-panel {
            padding: 24px;
        }

        .panel-head {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 16px;
            margin-bottom: 18px;
        }

        .panel-head h2 {
            font-family: "Space Grotesk", sans-serif;
            font-size: 24px;
            color: var(--ink);
            letter-spacing: -.6px;
        }

        .panel-head p {
            margin-top: 8px;
            font-size: 13px;
            line-height: 1.65;
            color: var(--muted);
            max-width: 540px;
        }

        .panel-actions {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .btn {
            appearance: none;
            border: 0;
            border-radius: 999px;
            padding: 12px 18px;
            font-size: 12px;
            font-weight: 850;
            cursor: pointer;
            transition: transform .18s ease, box-shadow .18s ease, opacity .18s ease;
        }

        .btn:hover {
            transform: translateY(-1px);
        }

        .btn:disabled {
            cursor: not-allowed;
            opacity: .55;
            transform: none;
        }

        .btn-primary {
            color: #fff;
            background: linear-gradient(135deg, #1d4ed8, #2563eb);
            box-shadow: 0 14px 28px rgba(29, 78, 216, .22);
        }

        .btn-secondary {
            color: var(--blue);
            background: #eff6ff;
            border: 1px solid #bfdbfe;
        }

        .btn-teal {
            color: #fff;
            background: linear-gradient(135deg, #0f766e, #14b8a6);
            box-shadow: 0 14px 28px rgba(20, 184, 166, .18);
        }

        .progress-shell {
            margin-top: 14px;
            padding: 16px;
            border-radius: 18px;
            background: #f8fbff;
            border: 1px solid rgba(226, 232, 240, .84);
        }

        .progress-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 10px;
            font-size: 12px;
            font-weight: 700;
            color: var(--muted);
        }

        .progress-bar {
            width: 100%;
            height: 10px;
            border-radius: 999px;
            background: #dbe7f3;
            overflow: hidden;
        }

        .progress-bar span {
            display: block;
            height: 100%;
            border-radius: inherit;
            background: linear-gradient(90deg, #1d4ed8, #14b8a6);
        }

        .learning-switch {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px;
            border-radius: 999px;
            background: #f8fafc;
            border: 1px solid rgba(226, 232, 240, .9);
            margin-bottom: 18px;
        }

        .learning-switch button {
            appearance: none;
            border: 0;
            border-radius: 999px;
            padding: 10px 14px;
            background: transparent;
            color: var(--muted);
            cursor: pointer;
            font-size: 12px;
            font-weight: 800;
        }

        .learning-switch button.is-active {
            background: #fff;
            color: var(--ink);
            box-shadow: 0 10px 20px rgba(15, 23, 42, .06);
        }

        .learning-note {
            margin-bottom: 18px;
            padding: 15px 16px;
            border-radius: 18px;
            background: linear-gradient(135deg, rgba(15, 118, 110, .08), rgba(29, 78, 216, .08));
            border: 1px solid rgba(167, 243, 208, .88);
            font-size: 13px;
            line-height: 1.7;
            color: var(--text);
        }

        .block-list {
            display: grid;
            gap: 14px;
        }

        .learning-block {
            padding: 18px;
            border-radius: 20px;
            border: 1px solid rgba(226, 232, 240, .86);
            background: linear-gradient(180deg, #ffffff, #fbfdff);
        }

        .learning-block h3 {
            font-size: 16px;
            font-weight: 850;
            color: var(--ink);
        }

        .learning-block p {
            margin-top: 10px;
            font-size: 14px;
            line-height: 1.75;
            color: var(--text);
            white-space: pre-wrap;
        }

        .learning-block ul {
            margin-top: 12px;
            padding-left: 18px;
            color: var(--text);
        }

        .learning-block li {
            margin-bottom: 8px;
            font-size: 13px;
            line-height: 1.7;
        }

        .frame-wrap {
            display: none;
            min-height: 520px;
            border-radius: 22px;
            overflow: hidden;
            border: 1px solid rgba(226, 232, 240, .92);
            background: #ffffff;
        }

        .frame-wrap.is-visible {
            display: block;
        }

        .training-frame {
            width: 100%;
            min-height: 520px;
            border: 0;
            background: #fff;
        }

        .assessment-state {
            padding: 18px;
            border-radius: 18px;
            border: 1px solid rgba(226, 232, 240, .86);
            background: #f8fbff;
            font-size: 13px;
            line-height: 1.75;
            color: var(--muted);
        }

        .assessment-form {
            display: grid;
            gap: 14px;
        }

        .question-card {
            padding: 18px;
            border-radius: 20px;
            border: 1px solid rgba(226, 232, 240, .88);
            background: linear-gradient(180deg, #ffffff, #fbfdff);
        }

        .question-top {
            display: flex;
            align-items: flex-start;
            gap: 12px;
        }

        .question-index {
            width: 34px;
            height: 34px;
            border-radius: 12px;
            background: #eff6ff;
            border: 1px solid #bfdbfe;
            color: var(--blue);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: 850;
            flex-shrink: 0;
        }

        .question-copy strong {
            display: block;
            font-size: 15px;
            line-height: 1.6;
            color: var(--ink);
        }

        .question-copy p {
            margin-top: 6px;
            font-size: 12px;
            line-height: 1.6;
            color: var(--muted);
        }

        .option-list {
            display: grid;
            gap: 10px;
            margin-top: 14px;
        }

        .option-card {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 13px 14px;
            border-radius: 16px;
            border: 1px solid rgba(226, 232, 240, .88);
            background: #fff;
            cursor: pointer;
            transition: border-color .18s ease, background .18s ease, box-shadow .18s ease;
        }

        .option-card:hover {
            border-color: rgba(29, 78, 216, .24);
            box-shadow: 0 10px 22px rgba(29, 78, 216, .06);
        }

        .option-card input {
            flex-shrink: 0;
        }

        .option-card span {
            font-size: 13px;
            line-height: 1.65;
            color: var(--text);
        }

        .text-answer {
            width: 100%;
            margin-top: 14px;
            min-height: 50px;
            padding: 13px 14px;
            border-radius: 16px;
            border: 1px solid rgba(226, 232, 240, .9);
            font-size: 13px;
            font-family: inherit;
            color: var(--text);
            background: #fff;
        }

        .text-answer:focus {
            outline: none;
            border-color: rgba(29, 78, 216, .44);
            box-shadow: 0 0 0 4px rgba(29, 78, 216, .10);
        }

        .assessment-actions {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            align-items: center;
            margin-top: 18px;
            flex-wrap: wrap;
        }

        .assessment-actions small {
            font-size: 12px;
            color: var(--muted);
        }

        .result-banner {
            margin-bottom: 16px;
            padding: 18px;
            border-radius: 20px;
            border: 1px solid rgba(226, 232, 240, .88);
        }

        .result-banner.pass {
            background: linear-gradient(135deg, #ecfdf5, #ffffff);
            border-color: #a7f3d0;
        }

        .result-banner.fail {

   <div id="quizModal" class="quiz-modal">
    <div class="quiz-modal-card">
        <div class="quiz-modal-icon">
            📝
        </div>

        <h3>Move to Quiz</h3>

        <p>
            Are you sure you want to move to the quiz?
            The documentation will be hidden and the questionnaire will be displayed.
        </p>

        <div class="quiz-modal-actions">
            <button
                type="button"
                id="cancelQuizBtn"
                class="btn btn-secondary">
                Continue Reading
            </button>

                type="button"
                id="confirmQuizBtn"
                class="btn btn-primary">

</div>

    <script>
        const state = {
            portal: null,
            activeResultId: null,
            busy: false,
            responses: {},
            viewByResultId: {},
        };

        const params = new URLSearchParams(window.location.search);
        const peopleId = params.get("people_id");
        const preferredResultId = params.get("result_id");
        const flashBar = document.getElementById("flashBar");
        const appRoot = document.getElementById("appRoot");
        const topbarStatus = document.getElementById("topbarStatus");

        const STATUS_LABELS = {
            training_sent: "Training Assigned",
            training_done: "Training Completed",
            test_sent: "Assessment Ready",
            test_overdue: "Assessment Overdue",
            completed_pass: "Passed",
            completed_fail: "Failed",
            escalated: "Escalated"
        };

        const escapeHtml = (value) =>
            String(value ?? "")
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#39;");

        const ANSWER_REVEAL_PATTERNS = [
            /^((good|correct|right|best|expected)\s+answer|(correct|best)\s+option|answer\s+key|solution|bonne\s+r[eé]ponse|r[eé]ponse\s+correcte)\s*[:\-]/i,
            /^(the\s+correct\s+answer\s+is|la\s+bonne\s+r[eé]ponse\s+est|la\s+r[eé]ponse\s+correcte\s+est)\b/i
        ];

        const normalizeRevealCandidate = (value) =>
            String(value ?? "")
                .replace(/<[^>]*>/g, " ")
                .replace(/&nbsp;/gi, " ")
                .replace(/\s+/g, " ")
                .trim();

        const isAnswerRevealText = (value) => {
            const candidate = normalizeRevealCandidate(value);
            return candidate
                ? ANSWER_REVEAL_PATTERNS.some((pattern) => pattern.test(candidate))
                : false;
        };

        const stripAnswerRevealLines = (value) => {
            const text = String(value ?? "");
            if (!text) return "";

            return text
                .split(/\n+/)
                .map((line) => line.trim())
                .filter((line) => line && !isAnswerRevealText(line))
                .join("\n\n")
                .trim();
        };

        const sanitizeTrainingBlock = (block = {}) => {
            const sanitizedTitle = stripAnswerRevealLines(block.title || "");
            const sanitizedBody = stripAnswerRevealLines(block.body || "");
            const sanitizedBullets = Array.isArray(block.bullets)
                ? block.bullets
                    .map((bullet) => stripAnswerRevealLines(bullet))
                    .filter(Boolean)
                : [];

            return {
                ...block,
                title: sanitizedTitle || (isAnswerRevealText(block.title || "") ? "Learning Block" : String(block.title || "Learning Block")),
                body: sanitizedBody,
                bullets: sanitizedBullets
            };
        };

        const getChoiceBadge = (index) => String.fromCharCode(65 + (index % 26));

        const getQuestionGuidance = (question) =>
            question.type === "multi"
                ? "Select every option you believe is correct."
                : question.type === "text"
                    ? "Type the answer in your own words."
                    : "Select the one answer you believe is correct.";

        const getReviewOutcomeLabel = (entry) =>
            entry.is_correct === true
                ? "Accepted"
                : entry.is_correct === false
                    ? "Needs improvement"
                    : "Recorded for review";

        const formatDate = (value) => {
            if (!value) return "Not scheduled";
            const date = new Date(value);
            if (Number.isNaN(date.getTime())) return "Not scheduled";
            return date.toLocaleDateString("en-GB", {
                day: "2-digit",
                month: "short",
                year: "numeric"
            });
        };

        const formatDateTime = (value) => {
            if (!value) return "Not available";
            const date = new Date(value);
            if (Number.isNaN(date.getTime())) return "Not available";
            return date.toLocaleString("en-GB", {
                day: "2-digit",
                month: "short",
                year: "numeric",
                hour: "2-digit",
                minute: "2-digit"
            });
        };

        const getStatusLabel = (status) => STATUS_LABELS[status] || status || "Assigned";

        const getStatusClass = (status) => `status-${String(status || "training_sent").trim().toLowerCase().replace(/\s+/g, "_")}`;

            }

            flashBar.className = `flash is-visible ${type || ""}`.trim();
            flashBar.textContent = message;

            state.busy = Boolean(flag);
            topbarStatus.textContent = label || (flag ? "Working..." : "Training center ready");
        };

        const updateUrl = () => {
            if (!peopleId || !state.activeResultId) return;
            const url = new URL(window.location.href);
            url.searchParams.set("people_id", peopleId);
            url.searchParams.set("result_id", state.activeResultId);
            window.history.replaceState({}, "", url.toString());
        };

        const buildDocumentationUrl = (resultId) => {
            const url = new URL("/kpi-training-documentation", window.location.origin);
            if (peopleId) {
                url.searchParams.set("people_id", peopleId);
            }
            if (resultId) {
                url.searchParams.set("result_id", resultId);
            }
            return `${url.pathname}${url.search}`;
        };

        const getActiveAssignment = () =>
            (state.portal?.assignments || []).find((assignment) => String(assignment.result_id) === String(state.activeResultId)) || null;

        const ensureDraftAnswers = (assignment) => {
            if (!assignment || !assignment.result_id) return;
            if (!state.responses[assignment.result_id]) {
                state.responses[assignment.result_id] = {};
            }
        };

        const loadPortal = async (focusResultId = null) => {
            if (!peopleId) {
                renderSetupState();
                return;
            }

            setBusy(true, "Loading assigned trainings...");
            setFlash("", "");

            try {
                const response = await fetch(`/api/kpi-training/portal?people_id=${encodeURIComponent(peopleId)}`);
                const payload = await response.json();
                if (!response.ok) {
                    throw new Error(payload.error || "Could not load training assignments.");
                }

                state.portal = payload;
                const nextActiveId =
                    focusResultId && payload.assignments.some((assignment) => String(assignment.result_id) === String(focusResultId))
                        ? String(focusResultId)
                        : payload.active_result_id
                            ? String(payload.active_result_id)
                            : payload.assignments[0]
                                ? String(payload.assignments[0].result_id)
                                : null;

                state.activeResultId = nextActiveId;
                (payload.assignments || []).forEach((assignment) => {
                    ensureDraftAnswers(assignment);
                });

                renderApp();
                setBusy(false, payload.assignments.length ? "Training center ready" : "No active assignments found");

                renderErrorState(error.message || "Could not load the training portal.");

            const data = await response.json().catch(() => ({}));
            if (!response.ok) {

            return data;

        const confirmBtn = document.getElementById("confirmQuizBtn");
        const cancelBtn = document.getElementById("cancelQuizBtn");

        modal.classList.add("show");

        const cleanup = () => {
            modal.classList.remove("show");
            confirmBtn.removeEventListener("click", onConfirm);
            cancelBtn.removeEventListener("click", onCancel);
        };

        const onConfirm = () => {
            cleanup();
            resolve(true);
        };

        const onCancel = () => {
            cleanup();
            resolve(false);
        };

        confirmBtn.addEventListener("click", onConfirm);
        cancelBtn.addEventListener("click", onCancel);
    });

        const renderWorkspace = (assignment) => `

        const renderApp = () => {
            const assignments = state.portal?.assignments || [];
            if (!assignments.length) {

            const person = state.portal?.people || assignments[0].responsible;
            const activeAssignment = getActiveAssignment() || assignments[0];

            appRoot.className = "app-shell";

        const updateDraftAnswer = (resultId, questionId, values) => {
            ensureDraftAnswers({ result_id: resultId });
            state.responses[resultId][questionId] = values;
        };

        const readAnswersFromForm = (assignment) => {
            const form = document.getElementById("assessmentForm");
            if (!form) return {};

            const answers = {};
            assignment.test.questions.forEach((question) => {
                if (question.type === "text") {
                    const input = form.querySelector(`[data-question-id="${CSS.escape(question.id)}"]`);
                    const value = input ? input.value.trim() : "";
                    answers[question.id] = value ? [value] : [];
                    return;
                }

                const checkedInputs = Array.from(form.querySelectorAll(`[data-question-id="${CSS.escape(question.id)}"]:checked`));
                answers[question.id] = checkedInputs.map((input) => input.value).filter(Boolean);
            });

            state.responses[assignment.result_id] = answers;
            return answers;
        };

        const validateAnswers = (assignment, answers) => {
            const missing = (assignment.test.questions || []).filter((question) => {
                const values = Array.isArray(answers[question.id]) ? answers[question.id].filter(Boolean) : [];
                return values.length === 0;
            });

            return {
                valid: missing.length === 0,
                missingCount: missing.length
            };
        };

        const bindWorkspaceEvents = (assignment) => {
            document.querySelectorAll(".assignment-card").forEach((button) => {
                button.addEventListener("click", () => {
                    state.activeResultId = button.dataset.resultId;
                    renderApp();
                });
            });

            const jumpToAssessmentBtn = document.getElementById("jumpToAssessmentBtn");
            if (jumpToAssessmentBtn) {
                jumpToAssessmentBtn.addEventListener("click", () => {
                    const target = document.getElementById("assessmentPanel");
                    if (target) target.scrollIntoView({ behavior: "smooth", block: "start" });
                });
            }

const completeTrainingBtn = document.getElementById("completeTrainingBtn");

if (completeTrainingBtn) {
    completeTrainingBtn.addEventListener("click", async () => {

        // SHOW CONFIRMATION MODAL FIRST
        const confirmed = await showQuizConfirmation();

        if (!confirmed) {
            return;
        }

        try {
            setBusy(true, "Opening questionnaire...");

            const result = await postJson(
                `/api/kpi-training/results/${assignment.result_id}/training-complete`,
                {}
            );

            const nextResultId =
                result.assignment?.result_id || assignment.result_id;

            state.viewByResultId[nextResultId] = "quiz";

            const documentationPanel =
                document.getElementById("documentationPanel");

            if (documentationPanel) {
                documentationPanel.remove();
            }

            const contentGrid =
                document.querySelector(".content-grid");

            if (contentGrid) {
                contentGrid.innerHTML =
                    renderAssessmentPanel({
                        ...assignment,
                        progress: {
                            ...assignment.progress,
                            training_completed: true,
                            test_sent: true
                        }
                    });
            }

            setBusy(false, "Questionnaire ready");

            setFlash(
                "success",
                "Documentation completed. Questionnaire unlocked."
            );

        } catch (error) {

            setFlash(
                "error",
                error.message || "Could not open questionnaire."
            );

            setBusy(false, "Training center ready");
        }
    });
}

            const assessmentForm = document.getElementById("assessmentForm");
            if (assessmentForm) {
                assessmentForm.querySelectorAll("input[type='radio'], input[type='checkbox'], input[type='text']").forEach((input) => {
                    input.addEventListener("change", () => {
                        readAnswersFromForm(assignment);
                    });
                    input.addEventListener("input", () => {
                        readAnswersFromForm(assignment);
                    });
                });
            }

            const submitAssessmentBtn = document.getElementById("submitAssessmentBtn");
            if (submitAssessmentBtn) {
                submitAssessmentBtn.addEventListener("click", async () => {
                    try {
                        const answers = readAnswersFromForm(assignment);
                        const validation = validateAnswers(assignment, answers);
                        if (!validation.valid) {
                            setFlash("error", `Please complete all ${validation.missingCount} remaining question(s) before submitting the QCM.`);
                            return;
                        }

                        setBusy(true, "Submitting questionnaire...");
                        const result = await postJson(`/api/kpi-training/results/${assignment.result_id}/test-submit`, {
                            answers
                        });
                        setFlash("success", result.passed
                            ? `QCM submitted successfully. Final score: ${result.score}%.`
                            : `QCM submitted. Final score: ${result.score}%.`);
                        await loadPortal(result.assignment?.result_id || assignment.result_id);
                    } catch (error) {
                        setFlash("error", error.message || "Could not submit the questionnaire.");
                        setBusy(false, "Training center ready");
                    }
                });
            }
        };

        if (peopleId) {
            loadPortal(preferredResultId);
        } else {
            renderSetupState();
            topbarStatus.textContent = "Waiting for a people_id query parameter";
        }
    </script>
</body>

</html>
